services:

  # ─── Bases de dados ──────────────────────────────────────────
  catalog-db:
    image: postgres:16-alpine
    container_name: catalog-db
    environment:
      POSTGRES_DB: catalogdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  order-db:
    image: postgres:16-alpine
    container_name: order-db
    environment:
      POSTGRES_DB: orderdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Serviços ────────────────────────────────────────────────
  user-service:
    build: ./user-service
    ports:
      - "8081:8081"
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  catalog-service:
    build: ./catalog-service
    ports:
      - "8082:8082"
    environment:
      DB_HOST: catalog-db
      DB_PORT: 5432
      DB_NAME: catalogdb
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on:
      catalog-db:
        condition: service_healthy
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8082/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  order-service:
    build: ./order-service
    ports:
      - "8083:8083"
    environment:
      DB_HOST: order-db
      DB_PORT: 5432
      DB_NAME: orderdb
      DB_USER: postgres
      DB_PASSWORD: postgres
      USER_SERVICE_URL: http://user-service:8081
      CATALOG_SERVICE_URL: http://catalog-service:8082
      AWS_REGION: ${AWS_REGION:-eu-west-1}
      SQS_QUEUE_URL: ${SQS_QUEUE_URL}
    depends_on:
      order-db:
        condition: service_healthy
      catalog-service:
        condition: service_started
      user-service:
        condition: service_started
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8083/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  notification-service:
    build: ./notification-service
    ports:
      - "8084:8084"
    environment:
      AWS_REGION: ${AWS_REGION:-eu-west-1}
      SQS_QUEUE_URL: ${SQS_QUEUE_URL}
    depends_on:
      - order-service
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8084/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  api-gateway:
    build: ./api-gateway
    ports:
      - "8080:8080"
    environment:
      USER_SERVICE_URL: http://user-service:8081
      CATALOG_SERVICE_URL: http://catalog-service:8082
      ORDER_SERVICE_URL: http://order-service:8083
    depends_on:
      - catalog-service
      - order-service
      - user-service
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  microservices-network:
    driver: bridge